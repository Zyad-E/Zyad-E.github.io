        <script defer data-name="navigation-logic">
          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const mobileToggle = document.getElementById("mobileToggle")
              const closeOverlay = document.getElementById("closeOverlay")
              const mobileOverlay = document.getElementById("mobileOverlay")
              const overlayLinks = document.querySelectorAll(".navigation-overlay-item")

              const openMenu = () => {
                mobileOverlay.style.display = "flex"
                mobileToggle.setAttribute("aria-expanded", "true")
                document.body.style.overflow = "hidden"

                overlayLinks.forEach((link, index) => {
                  link.style.opacity = "0"
                  link.style.transform = "translateY(20px)"
                  setTimeout(() => {
                    link.style.transition = "all 0.4s ease-out"
                    link.style.opacity = "1"
                    link.style.transform = "translateY(0)"
                  }, 100 + index * 50)
                })
              }

              const closeMenu = () => {
                mobileOverlay.style.display = "none"
                mobileToggle.setAttribute("aria-expanded", "false")
                document.body.style.overflow = ""
              }

              mobileToggle.addEventListener("click", openMenu)
              closeOverlay.addEventListener("click", closeMenu)

              overlayLinks.forEach((link) => {
                link.addEventListener("click", closeMenu)
              })

              window.addEventListener("resize", () => {
                if (window.innerWidth > 767) {
                  closeMenu()
                }
              })
            })()
          });
        </script>
